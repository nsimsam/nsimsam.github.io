<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#0d1117;
    --card:rgba(255,255,255,.05);
    --border:rgba(255,255,255,.08);
    --text:#f3f4f6;
    --muted:#9ca3af;
    --accent:#8b5cf6;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:
    radial-gradient(circle at top,#312e81 0%,transparent 40%),
    radial-gradient(circle at bottom right,#0f766e 0%,transparent 35%),
    var(--bg);

    color:var(--text);
    font-family:Inter,sans-serif;
    line-height:1.7;
}

.container{
    width:min(900px,90%);
    margin:auto;
}

header{
    padding:60px 0 40px;
}

header h1{
    font-size:2.5rem;
    font-weight:700;
}

header h1 a{
    color:inherit;
    text-decoration:none;
}

.tagline{
    color:var(--muted);
    margin-top:10px;
    font-size:1.1rem;
}

nav{
    margin-top:24px;
    display:flex;
    gap:20px;
}

nav a{
    color:white;
    text-decoration:none;
    opacity:.8;
    font-weight:600;
}

nav a:hover,
nav a.active{
    opacity:1;
}

section{
    padding-bottom:60px;
}

.post{
    background:var(--card);
    backdrop-filter:blur(18px);
    border:1px solid var(--border);
    border-radius:20px;
    padding:30px;
    margin-bottom:28px;
    transition:.25s;
}

.post:hover{
    transform:translateY(-4px);
}

.date{
    color:var(--muted);
    font-size:.9rem;
    margin-bottom:10px;
}

.post h2{
    margin-bottom:15px;
}

.post h2 a{
    color:inherit;
    text-decoration:none;
}

.post p{
    color:#d1d5db;
}

.readmore{
    display:inline-block;
    margin-top:18px;
    color:var(--accent);
    text-decoration:none;
    font-weight:600;
}

/* about page */
.hero-about{
    display:flex;
    align-items:center;
    gap:28px;
    margin-bottom:28px;
    flex-wrap:wrap;
}

.avatar{
    width:140px;
    height:140px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid var(--border);
    flex-shrink:0;
}

.hero-about h2{
    font-size:1.8rem;
}

.role{
    color:var(--muted);
    margin-top:6px;
}

.links{
    display:flex;
    gap:16px;
    margin-top:16px;
    flex-wrap:wrap;
}

.links a{
    color:var(--accent);
    text-decoration:none;
    font-weight:600;
}

.links a:hover{
    text-decoration:underline;
}

/* individual post page */
.post-full h1{
    margin-bottom:15px;
    font-size:2rem;
}

.post-full h2{
    margin-top:30px;
    margin-bottom:12px;
}

.post-full ul{
    margin-left:22px;
    margin-bottom:16px;
    color:#d1d5db;
}

.post-full p{
    color:#d1d5db;
    margin-bottom:16px;
}

footer{
    padding:50px 0;
    color:var(--muted);
    text-align:center;
    font-size:.9rem;
}
</style>

</head>
<body>

<div class="container">

<header>
<h1><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
<p class="tagline">{{ site.tagline }}</p>

<nav>
<a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="active"{% endif %}>About</a>
<a href="{{ '/blog/' | relative_url }}"{% if page.url contains '/blog' %} class="active"{% endif %}>Blog</a>
</nav>
</header>

<section>
{{ content }}
</section>

<footer>
{{ site.title }} · built with Jekyll + GitHub Pages
</footer>

</div>

</body>
</html>
